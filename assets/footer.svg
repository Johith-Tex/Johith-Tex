<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <style>
      @keyframes wave-shift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-40px); }
      }

      @keyframes text-glow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }

      @keyframes blink-slow {
        0%, 40% { opacity: 1; }
        50%, 90% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes invader-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      .footer-bg { fill: #0d1117; }
      .wave-line { fill: none; stroke: #00f5d4; stroke-width: 1.5; opacity: 0.2; }
      .wave-line-2 { fill: none; stroke: #ffbe0b; stroke-width: 1; opacity: 0.1; }
      .main-text { font-family: 'Courier New', Courier, monospace; font-size: 22px; fill: #00f5d4; font-weight: bold; animation: text-glow 3s ease-in-out infinite; letter-spacing: 3px; }
      .sub-text { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #8b949e; letter-spacing: 1px; }

      .pixel-wave { fill: #00f5d4; opacity: 0.08; }
      .footer-line { stroke: #00f5d4; stroke-width: 1; opacity: 0.2; }
      .corner-f { fill: #00f5d4; opacity: 0.4; }
      .invader { fill: #ffbe0b; opacity: 0.3; animation: invader-float 3s ease-in-out infinite; }
      .invader-2 { animation-delay: 0.5s; }
      .invader-3 { animation-delay: 1s; }

      .dot-footer { fill: #00f5d4; opacity: 0.3; }

      @media (prefers-color-scheme: light) {
        .footer-bg { fill: #f6f8fa; }
        .wave-line { stroke: #1a1a2e; }
        .wave-line-2 { stroke: #b45309; }
        .main-text { fill: #1a1a2e; }
        .sub-text { fill: #57606a; }
        .cursor-footer { fill: #1a8a3a; }
        .pixel-wave { fill: #1a1a2e; }
        .footer-line { stroke: #1a1a2e; }
        .corner-f { fill: #1a1a2e; }
        .invader { fill: #b45309; }
        .code-text { fill: #1a8a3a; }
        .dot-footer { fill: #1a1a2e; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="footer-bg" width="900" height="180" rx="6"/>

  <!-- Top pixel wave decoration -->
  <rect class="pixel-wave" x="0" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="40" y="0" width="40" height="8"/>
  <rect class="pixel-wave" x="80" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="120" y="0" width="40" height="12"/>
  <rect class="pixel-wave" x="160" y="0" width="40" height="6"/>
  <rect class="pixel-wave" x="200" y="0" width="40" height="10"/>
  <rect class="pixel-wave" x="240" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="280" y="0" width="40" height="14"/>
  <rect class="pixel-wave" x="320" y="0" width="40" height="6"/>
  <rect class="pixel-wave" x="360" y="0" width="40" height="10"/>
  <rect class="pixel-wave" x="400" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="440" y="0" width="40" height="16"/>
  <rect class="pixel-wave" x="480" y="0" width="40" height="8"/>
  <rect class="pixel-wave" x="520" y="0" width="40" height="12"/>
  <rect class="pixel-wave" x="560" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="600" y="0" width="40" height="10"/>
  <rect class="pixel-wave" x="640" y="0" width="40" height="6"/>
  <rect class="pixel-wave" x="680" y="0" width="40" height="14"/>
  <rect class="pixel-wave" x="720" y="0" width="40" height="4"/>
  <rect class="pixel-wave" x="760" y="0" width="40" height="8"/>
  <rect class="pixel-wave" x="800" y="0" width="40" height="12"/>
  <rect class="pixel-wave" x="840" y="0" width="60" height="6"/>

  <!-- Horizontal separator line -->
  <line class="footer-line" x1="60" y1="25" x2="840" y2="25"/>

  <!-- Space invader pixel art (left) - simplified 8-bit style -->
  <g class="invader" transform="translate(120, 55)">
    <!-- Row 1 -->
    <rect x="8" y="0" width="4" height="4"/>
    <rect x="20" y="0" width="4" height="4"/>
    <!-- Row 2 -->
    <rect x="12" y="4" width="4" height="4"/>
    <rect x="16" y="4" width="4" height="4"/>
    <!-- Row 3 -->
    <rect x="8" y="8" width="4" height="4"/>
    <rect x="12" y="8" width="4" height="4"/>
    <rect x="16" y="8" width="4" height="4"/>
    <rect x="20" y="8" width="4" height="4"/>
    <!-- Row 4 -->
    <rect x="4" y="12" width="4" height="4"/>
    <rect x="8" y="12" width="4" height="4"/>
    <rect x="12" y="12" width="4" height="4" fill="none"/>
    <rect x="16" y="12" width="4" height="4" fill="none"/>
    <rect x="20" y="12" width="4" height="4"/>
    <rect x="24" y="12" width="4" height="4"/>
    <!-- Row 5 -->
    <rect x="0" y="16" width="4" height="4"/>
    <rect x="8" y="16" width="4" height="4"/>
    <rect x="12" y="16" width="4" height="4"/>
    <rect x="16" y="16" width="4" height="4"/>
    <rect x="20" y="16" width="4" height="4"/>
    <rect x="28" y="16" width="4" height="4"/>
    <!-- Row 6 -->
    <rect x="0" y="20" width="4" height="4"/>
    <rect x="8" y="20" width="4" height="4"/>
    <rect x="20" y="20" width="4" height="4"/>
    <rect x="28" y="20" width="4" height="4"/>
  </g>

  <!-- Space invader (right) -->
  <g class="invader invader-2" transform="translate(740, 55)">
    <rect x="8" y="0" width="4" height="4"/>
    <rect x="20" y="0" width="4" height="4"/>
    <rect x="12" y="4" width="4" height="4"/>
    <rect x="16" y="4" width="4" height="4"/>
    <rect x="8" y="8" width="4" height="4"/>
    <rect x="12" y="8" width="4" height="4"/>
    <rect x="16" y="8" width="4" height="4"/>
    <rect x="20" y="8" width="4" height="4"/>
    <rect x="4" y="12" width="4" height="4"/>
    <rect x="8" y="12" width="4" height="4"/>
    <rect x="20" y="12" width="4" height="4"/>
    <rect x="24" y="12" width="4" height="4"/>
    <rect x="0" y="16" width="4" height="4"/>
    <rect x="8" y="16" width="4" height="4"/>
    <rect x="12" y="16" width="4" height="4"/>
    <rect x="16" y="16" width="4" height="4"/>
    <rect x="20" y="16" width="4" height="4"/>
    <rect x="28" y="16" width="4" height="4"/>
    <rect x="0" y="20" width="4" height="4"/>
    <rect x="8" y="20" width="4" height="4"/>
    <rect x="20" y="20" width="4" height="4"/>
    <rect x="28" y="20" width="4" height="4"/>
  </g>

  <!-- Main text -->
  <text class="main-text" x="450" y="80" text-anchor="middle">GAME OVER?  NEVER.</text>

  <!-- Sub text -->
  <text class="sub-text" x="450" y="110" text-anchor="middle">Thanks for scrolling through my profile!</text>

  <!-- Sub text -->
  <text class="sub-text" x="450" y="132" text-anchor="middle">Made with code and caffeine</text>



  <!-- Bottom corner decorations -->
  <rect class="corner-f" x="16" y="160" width="20" height="2" rx="1"/>
  <rect class="corner-f" x="16" y="160" width="2" height="12" rx="1"/>
  <rect class="corner-f" x="864" y="160" width="20" height="2" rx="1"/>
  <rect class="corner-f" x="882" y="160" width="2" height="12" rx="1"/>

  <!-- Decorative dots bottom -->
  <circle class="dot-footer" cx="200" cy="165" r="1.5"/>
  <circle class="dot-footer" cx="350" cy="165" r="1.5"/>
  <circle class="dot-footer" cx="550" cy="165" r="1.5"/>
  <circle class="dot-footer" cx="700" cy="165" r="1.5"/>


</svg>
