<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @keyframes glow-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }

      @keyframes blink-cursor {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes twinkle-1 { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }
      @keyframes twinkle-2 { 0%, 100% { opacity: 0.2; } 60% { opacity: 0.9; } }
      @keyframes twinkle-3 { 0%, 100% { opacity: 0.15; } 40% { opacity: 1; } }

      @keyframes scanline {
        0% { transform: translateY(-10px); }
        100% { transform: translateY(310px); }
      }

      @keyframes glitch-r {
        0%, 85%, 89%, 100% { opacity: 0; transform: translate(0); }
        86% { opacity: 0.7; transform: translate(-3px, -1px); }
        87% { opacity: 0.5; transform: translate(2px, 1px); }
        88% { opacity: 0.8; transform: translate(-1px, 2px); }
      }

      @keyframes glitch-b {
        0%, 90%, 94%, 100% { opacity: 0; transform: translate(0); }
        91% { opacity: 0.6; transform: translate(3px, 1px); }
        92% { opacity: 0.4; transform: translate(-2px, -1px); }
        93% { opacity: 0.7; transform: translate(1px, -2px); }
      }

      @keyframes float-subtle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }

      @keyframes bar-fill-hp {
        0% { width: 0; }
        100% { width: 210px; }
      }

      @keyframes bar-fill-xp {
        0% { width: 0; }
        100% { width: 170px; }
      }

      @keyframes border-glow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }

      /* Dark mode (default) */
      .bg { fill: #0d1117; }
      .grid-line { stroke: #161b22; stroke-width: 0.5; fill: none; }
      .main-title { font-family: 'Courier New', Courier, monospace; font-size: 58px; font-weight: bold; fill: #00f5d4; animation: glow-pulse 3s ease-in-out infinite; }
      .glitch-layer-r { font-family: 'Courier New', Courier, monospace; font-size: 58px; font-weight: bold; fill: #ff006e; animation: glitch-r 5s ease-in-out infinite; }
      .glitch-layer-b { font-family: 'Courier New', Courier, monospace; font-size: 58px; font-weight: bold; fill: #4361ee; animation: glitch-b 5s ease-in-out infinite; }
      .subtitle { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #ffbe0b; animation: float-subtle 4s ease-in-out infinite; letter-spacing: 1.5px; }
      .cursor { fill: #39ff14; animation: blink-cursor 1s step-end infinite; }
      .corner { fill: #00f5d4; opacity: 0.5; }
      .corner-glow { fill: #00f5d4; opacity: 0.5; animation: border-glow 3s ease-in-out infinite; }
      .star { fill: #ffffff; }
      .s1 { animation: twinkle-1 3s ease-in-out infinite; }
      .s2 { animation: twinkle-2 4s ease-in-out 0.5s infinite; }
      .s3 { animation: twinkle-3 3.5s ease-in-out 1s infinite; }
      .s4 { animation: twinkle-1 4.5s ease-in-out 1.5s infinite; }
      .s5 { animation: twinkle-2 3s ease-in-out 2s infinite; }
      .s6 { animation: twinkle-3 4s ease-in-out 2.5s infinite; }
      .level-text { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #8b949e; letter-spacing: 2px; }
      .bar-label { font-family: 'Courier New', Courier, monospace; font-size: 10px; fill: #8b949e; font-weight: bold; }
      .bar-bg { fill: #21262d; }
      .bar-hp { fill: #39ff14; animation: bar-fill-hp 2s ease-out forwards; }
      .bar-xp { fill: #00f5d4; animation: bar-fill-xp 2s ease-out 0.3s forwards; }
      .scanline-bar { fill: rgba(255,255,255,0.03); animation: scanline 3.5s linear infinite; }
      .accent-line { stroke: #00f5d4; stroke-width: 1; opacity: 0.3; }
      .deco-dot { fill: #00f5d4; opacity: 0.4; }
      .chevron { font-family: 'Courier New', Courier, monospace; font-size: 20px; fill: #00f5d4; opacity: 0.3; }

      /* Light mode overrides */
      @media (prefers-color-scheme: light) {
        .bg { fill: #f6f8fa; }
        .grid-line { stroke: #d8dee4; }
        .main-title { fill: #1a1a2e; }
        .glitch-layer-r { fill: #e3326f; }
        .glitch-layer-b { fill: #6e7ff5; }
        .subtitle { fill: #92600a; }
        .cursor { fill: #1a8a3a; }
        .corner, .corner-glow { fill: #1a1a2e; }
        .star { fill: #b0b8c4; }
        .level-text, .bar-label { fill: #57606a; }
        .bar-bg { fill: #d8dee4; }
        .accent-line { stroke: #1a1a2e; }
        .deco-dot { fill: #1a1a2e; }
        .chevron { fill: #1a1a2e; }
      }
    </style>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" class="grid-line"/>
    </pattern>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(255,255,255,0.015)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="300" rx="6"/>

  <!-- Grid overlay -->
  <rect width="900" height="300" fill="url(#grid)" rx="6"/>

  <!-- Scanline texture -->
  <rect width="900" height="300" fill="url(#scanlines)" rx="6"/>

  <!-- Stars / particles -->
  <circle class="star s1" cx="52" cy="28" r="1.5"/>
  <circle class="star s2" cx="148" cy="75" r="1"/>
  <circle class="star s3" cx="295" cy="22" r="1.8"/>
  <circle class="star s4" cx="425" cy="65" r="1.2"/>
  <circle class="star s5" cx="558" cy="35" r="2"/>
  <circle class="star s6" cx="702" cy="55" r="1.3"/>
  <circle class="star s1" cx="815" cy="30" r="1.6"/>
  <circle class="star s3" cx="135" cy="245" r="1"/>
  <circle class="star s5" cx="380" cy="265" r="1.5"/>
  <circle class="star s2" cx="625" cy="275" r="1.2"/>
  <circle class="star s4" cx="755" cy="240" r="1.8"/>
  <circle class="star s6" cx="855" cy="255" r="1"/>
  <circle class="star s1" cx="88" cy="148" r="1.3"/>
  <circle class="star s3" cx="820" cy="155" r="1.5"/>
  <circle class="star s5" cx="470" cy="282" r="1"/>
  <circle class="star s2" cx="680" cy="18" r="1.4"/>
  <circle class="star s4" cx="230" cy="190" r="1.1"/>
  <circle class="star s6" cx="590" cy="250" r="1.6"/>

  <!-- Corner brackets — Top Left -->
  <rect class="corner-glow" x="16" y="16" width="30" height="3" rx="1"/>
  <rect class="corner-glow" x="16" y="16" width="3" height="30" rx="1"/>
  <!-- Top Right -->
  <rect class="corner-glow" x="854" y="16" width="30" height="3" rx="1"/>
  <rect class="corner-glow" x="881" y="16" width="3" height="30" rx="1"/>
  <!-- Bottom Left -->
  <rect class="corner-glow" x="16" y="281" width="30" height="3" rx="1"/>
  <rect class="corner-glow" x="16" y="254" width="3" height="30" rx="1"/>
  <!-- Bottom Right -->
  <rect class="corner-glow" x="854" y="281" width="30" height="3" rx="1"/>
  <rect class="corner-glow" x="881" y="254" width="3" height="30" rx="1"/>

  <!-- Decorative dots along sides -->
  <circle class="deco-dot" cx="16" cy="90" r="2"/>
  <circle class="deco-dot" cx="16" cy="150" r="2"/>
  <circle class="deco-dot" cx="16" cy="210" r="2"/>
  <circle class="deco-dot" cx="884" cy="90" r="2"/>
  <circle class="deco-dot" cx="884" cy="150" r="2"/>
  <circle class="deco-dot" cx="884" cy="210" r="2"/>

  <!-- Chevron decorations -->
  <text class="chevron" x="60" y="160" text-anchor="middle">«</text>
  <text class="chevron" x="840" y="160" text-anchor="middle">»</text>

  <!-- Glitch layers (behind main text) -->
  <text class="glitch-layer-r" x="450" y="125" text-anchor="middle" filter="url(#glow)">JOHITH-TEX</text>
  <text class="glitch-layer-b" x="450" y="125" text-anchor="middle" filter="url(#glow)">JOHITH-TEX</text>

  <!-- Main title -->
  <text class="main-title" x="450" y="125" text-anchor="middle" filter="url(#glow)">JOHITH-TEX</text>

  <!-- Accent line under title -->
  <line class="accent-line" x1="260" y1="140" x2="640" y2="140"/>

  <!-- Subtitle with cursor -->
  <text class="subtitle" x="450" y="170" text-anchor="middle">&gt; Full-Stack Dev | Game Creator | Bot Builder</text>
  <rect class="cursor" x="660" y="158" width="9" height="14" rx="1"/>

  <!-- Level indicator -->
  <text class="level-text" x="450" y="205" text-anchor="middle">━━━━━ LVL  ∞ ━━━━━</text>

  <!-- HP Bar -->
  <text class="bar-label" x="310" y="230" text-anchor="end">HP</text>
  <rect class="bar-bg" x="320" y="221" width="260" height="12" rx="3"/>
  <rect class="bar-hp" x="321" y="222" width="0" height="10" rx="2"/>

  <!-- XP Bar -->
  <text class="bar-label" x="310" y="252" text-anchor="end">XP</text>
  <rect class="bar-bg" x="320" y="243" width="260" height="12" rx="3"/>
  <rect class="bar-xp" x="321" y="244" width="0" height="10" rx="2"/>

  <!-- Animated scanline sweep -->
  <rect class="scanline-bar" x="0" y="-10" width="900" height="6" rx="2"/>
</svg>
