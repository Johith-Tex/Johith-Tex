<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30" width="900" height="30">
  <defs>
    <style>
      @keyframes pulse-dot {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      @keyframes dash-flow {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }

      .line-main { stroke: #00f5d4; stroke-width: 1; opacity: 0.25; }
      .line-dashed { stroke: #00f5d4; stroke-width: 1; opacity: 0.15; stroke-dasharray: 8 4; animation: dash-flow 2s linear infinite; }
      .dot-center { fill: #00f5d4; opacity: 0.8; }
      .diamond { fill: #00f5d4; opacity: 0.6; }
      .dot-pulse { fill: #ffbe0b; animation: pulse-dot 2s ease-in-out infinite; }
      .dot-p2 { animation-delay: 0.3s; }
      .dot-p3 { animation-delay: 0.6s; }
      .dot-p4 { animation-delay: 0.9s; }
      .pixel-block { fill: #00f5d4; opacity: 0.15; }

      @media (prefers-color-scheme: light) {
        .line-main { stroke: #1a1a2e; }
        .line-dashed { stroke: #1a1a2e; }
        .dot-center { fill: #1a1a2e; }
        .diamond { fill: #1a1a2e; }
        .dot-pulse { fill: #b45309; }
        .pixel-block { fill: #1a1a2e; }
      }
    </style>
  </defs>

  <!-- Main horizontal lines -->
  <line class="line-main" x1="80" y1="15" x2="390" y2="15"/>
  <line class="line-main" x1="510" y1="15" x2="820" y2="15"/>

  <!-- Animated dashed extensions -->
  <line class="line-dashed" x1="30" y1="15" x2="80" y2="15"/>
  <line class="line-dashed" x1="820" y1="15" x2="870" y2="15"/>

  <!-- Center diamond -->
  <polygon class="diamond" points="450,5 460,15 450,25 440,15"/>

  <!-- Inner dot -->
  <circle class="dot-center" cx="450" cy="15" r="2.5"/>

  <!-- Pulsing dots along the line -->
  <circle class="dot-pulse" cx="160" cy="15" r="2"/>
  <circle class="dot-pulse dot-p2" cx="270" cy="15" r="2"/>
  <circle class="dot-pulse dot-p3" cx="630" cy="15" r="2"/>
  <circle class="dot-pulse dot-p4" cx="740" cy="15" r="2"/>

  <!-- Pixel blocks decoration -->
  <rect class="pixel-block" x="100" y="11" width="4" height="4"/>
  <rect class="pixel-block" x="108" y="11" width="4" height="4"/>
  <rect class="pixel-block" x="100" y="17" width="4" height="4"/>

  <rect class="pixel-block" x="788" y="11" width="4" height="4"/>
  <rect class="pixel-block" x="796" y="11" width="4" height="4"/>
  <rect class="pixel-block" x="796" y="17" width="4" height="4"/>

  <!-- Endpoint markers -->
  <rect class="diamond" x="26" y="12" width="6" height="6" rx="1" transform="rotate(45,29,15)"/>
  <rect class="diamond" x="868" y="12" width="6" height="6" rx="1" transform="rotate(45,871,15)"/>
</svg>
